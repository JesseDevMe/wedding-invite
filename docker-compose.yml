services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "0"
    expose:
      - "3000"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      LETSENCRYPT_STAGING: ${LETSENCRYPT_STAGING:-0}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - ./docker/ssl:/docker/ssl:ro
    entrypoint: ["/bin/sh", "/docker/ssl/renew.sh"]

volumes:
  letsencrypt:
  certbot_webroot:
